<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Concept C-oct — Octagon frame + camera lens -->
  <defs>
    <linearGradient id="bgCo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#11111b"/>
    </linearGradient>
    <radialGradient id="lensCo" cx="0.38" cy="0.34" r="0.8">
      <stop offset="0"   stop-color="#bcd9ff"/>
      <stop offset="0.5" stop-color="#89b4fa"/>
      <stop offset="1"   stop-color="#3b4a78"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bgCo)"/>

  <!-- octagon brand frame -->
  <path d="M807.6,634.5 L634.5,807.6 L389.5,807.6 L216.4,634.5 L216.4,389.5 L389.5,216.4 L634.5,216.4 L807.6,389.5 Z"
        fill="none" stroke="#b4befe" stroke-width="34" stroke-linejoin="round"/>

  <!-- camera lens -->
  <circle cx="512" cy="512" r="158" fill="url(#lensCo)"/>
  <circle cx="512" cy="512" r="158" fill="none" stroke="#b4befe" stroke-width="16"/>
  <ellipse cx="460" cy="452" rx="46" ry="29" fill="#ffffff" opacity="0.55"/>
</svg>
