[package]
name = "oxdm"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { version = "=0.7.4", features = ["desktop", "router"] }
oxvif = "0.8.4"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
dirs = "6"
if-addrs = "0.13"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[profile.wasm-dev]
inherits = "dev"
opt-level = 1

[profile.server-dev]
inherits = "dev"

[profile.android-dev]
inherits = "dev"
