[application]
default_platform = "desktop"

[bundle]
identifier = "com.smiti1642.oxdm"
publisher = "smiti1642"
# App icons at multiple sizes. The Linux AppImage/deb bundler files each PNG
# into usr/share/icons/hicolor/<WxH>/apps/ by its pixel dimensions, so shipping
# the standard sizes (not just 1024) is what lets the desktop-menu / taskbar
# icon resolve across desktop environments. dx generates the platform formats
# (.icns/.ico) from this set at bundle time. Regenerate from
# assets/icons/oxdm.svg via scripts/gen-icons.sh.
icon = [
    "assets/icons/icon-32.png",
    "assets/icons/icon-128.png",
    "assets/icons/icon-256.png",
    "assets/icons/icon-512.png",
    "assets/icons/icon.png",
]

[web.app]
title = "OxDM"

[web.resource]
style = []
script = []

[web.resource.dev]
script = []
