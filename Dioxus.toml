[application]
default_platform = "desktop"

[bundle]
identifier = "com.smiti1642.oxdm"
publisher = "smiti1642"
# App icon: a SINGLE 1024 PNG. dx/tao then synthesizes the full .icns ladder
# itself — including the @2x/Retina slots — which is what keeps the macOS Dock
# icon sharp. Feeding a multi-size list (icon-32/128/256/512 + 1024, used from
# 0.1.1 through 0.1.4) made tao fill only the @1x .icns slots, leaving the
# Retina slots empty, so every modern (Retina) Mac upscaled a smaller rep and
# the Dock icon rendered blurry. 0.1.0 shipped a single 1024 and was sharp.
# Trade-off: the Linux .deb desktop-menu icon may resolve less cleanly from a
# single size — revisit per-platform if that regresses. Regenerate from
# assets/icons/oxdm.svg via scripts/gen-icons.sh.
icon = ["assets/icons/icon.png"]

# Runtime apt dependencies for the .deb. dx's auto-detection misses these, so
# `apt install ./oxdm.deb` left libxdo3 unsatisfied and the binary failed with
# `libxdo.so.3: cannot open shared object file` until installed by hand. Declare
# the full set explicitly — they mirror the `-dev` packages the CI build links
# against (libwebkit2gtk-4.1-dev / libgtk-3-dev / libayatana-appindicator3-dev /
# libxdo-dev). apt is simply satisfied for any already present on the system.
[bundle.deb]
depends = [
    "libwebkit2gtk-4.1-0",
    "libgtk-3-0",
    "libayatana-appindicator3-1",
    "libxdo3",
]

[web.app]
title = "OxDM"

[web.resource]
style = []
script = []

[web.resource.dev]
script = []
