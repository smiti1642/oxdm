name: Release

# Build platform bundles and attach them to the GitHub Release for a v* tag.
# macOS = Apple Silicon (aarch64), Windows = x86_64, Linux = x86_64.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bundle:
    name: ${{ matrix.label }} (${{ matrix.pkg }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos-aarch64
            pkg: dmg
            ext: dmg
          - os: windows-latest
            label: windows-x86_64
            pkg: msi
            ext: msi
          # Debian/Ubuntu package. Unlike an AppImage, a .deb does NOT bundle
          # glib/gtk/webkit — it depends on the system ones, so the binary and
          # the WebKitWebProcess it spawns are always the same version. The
          # AppImage bundled an older glib/webkit that clashed on newer systems
          # (`undefined symbol: g_variant_builder_init_static`, then a WebKit IPC
          # mismatch -> grey window), and on Fedora couldn't find the webkit
          # helper at all. The dx RPM is also dropped (malformed cpio payload).
          # Built on 24.04 for forward-compat; installs on 24.04+. Fedora/RHEL
          # support is planned via Flatpak.
          - os: ubuntu-24.04
            label: ubuntu-x86_64
            pkg: deb
            ext: deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev libxdo-dev

      # Pin dioxus-cli to the version oxdm's dioxus is pinned to (=0.7.5).
      - uses: cargo-bins/cargo-binstall@main
      - name: Install dioxus-cli
        # Authenticate binstall's GitHub API calls — anonymous requests get
        # rate-limited (403) when fetching the dioxus-cli release artifact,
        # which intermittently failed the macOS job.
        #
        # --force: Swatinem/rust-cache restores binstall's install *record*
        # (so binstall thinks dioxus-cli is already installed and skips it)
        # without the actual `dx` binary in ~/.cargo/bin, leaving the Bundle
        # step with "dx: command not found". Forcing a reinstall guarantees
        # the binary is present every run.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo binstall -y --force dioxus-cli@0.7.5

      - name: Bundle
        run: dx bundle --release --platform desktop --package-types ${{ matrix.pkg }}

      - name: Collect artifact
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          src=$(find target/dx/oxdm/bundle -type f -name "*.${{ matrix.ext }}" | head -1)
          if [ -z "$src" ]; then echo "no .${{ matrix.ext }} produced"; exit 1; fi
          mkdir -p out
          cp "$src" "out/oxdm-${version}-${{ matrix.label }}.${{ matrix.ext }}"
          ls -la out

      # Windows also gets a no-install portable build alongside the MSI: just
      # the single self-contained oxdm.exe (CSS + icon are embedded, no sibling
      # assets dir), zipped. Like the MSI it relies on the WebView2 runtime,
      # which ships with Windows 10/11.
      - name: Add Windows portable zip
        if: matrix.pkg == 'msi'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          exe=$(find target -type f -name oxdm.exe -path '*release*' ! -path '*deps*' | head -1)
          if [ -z "$exe" ]; then echo "no oxdm.exe found"; exit 1; fi
          echo "portable exe: $exe"
          mkdir -p out
          # Copy to a flat name first so the zip holds `oxdm.exe` at its root,
          # not the full target/.../release/ path (7z stores paths as given).
          cp "$exe" oxdm.exe
          7z a "out/oxdm-${version}-windows-x86_64-portable.zip" oxdm.exe
          rm oxdm.exe
          ls -la out

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          # Draft so the maintainer reviews/assembles all platforms before
          # publishing. Each matrix job appends its asset to the same draft.
          draft: true
          files: out/*
