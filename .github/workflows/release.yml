name: Release

# Build platform bundles and attach them to the GitHub Release for a v* tag.
# macOS = Apple Silicon (aarch64), Windows = x86_64, Linux = x86_64.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bundle:
    name: ${{ matrix.label }} (${{ matrix.pkg }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos-aarch64
            pkg: dmg
            ext: dmg
          - os: windows-latest
            label: windows-x86_64
            pkg: msi
            ext: msi
          # AppImage built on Ubuntu links Debian-family WebKitGTK paths, so it
          # only runs on Debian/Ubuntu-based distros — Fedora/RHEL resolve the
          # webkit helper (WebKitNetworkProcess) at a different path and crash on
          # launch. Labelled `ubuntu-*` so the asset filename states its range.
          # The dx-bundled RPM is intentionally dropped: its cpio payload is
          # malformed and won't install on ANY RPM distro. Fedora/RHEL support is
          # planned via Flatpak, not this AppImage.
          - os: ubuntu-latest
            label: ubuntu-x86_64
            pkg: appimage
            ext: AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev libxdo-dev libfuse2

      # Pin dioxus-cli to the version oxdm's dioxus is pinned to (=0.7.5).
      - uses: cargo-bins/cargo-binstall@main
      - name: Install dioxus-cli
        # Authenticate binstall's GitHub API calls — anonymous requests get
        # rate-limited (403) when fetching the dioxus-cli release artifact,
        # which intermittently failed the macOS job.
        #
        # --force: Swatinem/rust-cache restores binstall's install *record*
        # (so binstall thinks dioxus-cli is already installed and skips it)
        # without the actual `dx` binary in ~/.cargo/bin, leaving the Bundle
        # step with "dx: command not found". Forcing a reinstall guarantees
        # the binary is present every run.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo binstall -y --force dioxus-cli@0.7.5

      - name: Bundle
        run: dx bundle --release --platform desktop --package-types ${{ matrix.pkg }}

      - name: Collect artifact
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          src=$(find target/dx/oxdm/bundle -type f -name "*.${{ matrix.ext }}" | head -1)
          if [ -z "$src" ]; then echo "no .${{ matrix.ext }} produced"; exit 1; fi
          mkdir -p out
          cp "$src" "out/oxdm-${version}-${{ matrix.label }}.${{ matrix.ext }}"
          ls -la out

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          # Draft so the maintainer reviews/assembles all platforms before
          # publishing. Each matrix job appends its asset to the same draft.
          draft: true
          files: out/*
